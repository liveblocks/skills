name: Sync liveblocks-plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out skills
        uses: actions/checkout@v4

      - name: Check out plugin repository
        uses: actions/checkout@v4
        with:
          repository: liveblocks/liveblocks-plugin
          path: liveblocks-plugin
          token: ${{ secrets.LIVEBLOCKS_PLUGIN_SYNC_TOKEN }}

      - name: Sync files
        run: |
          find liveblocks-plugin -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          rsync -a .agents liveblocks-plugin/
          rsync -a .claude-plugin liveblocks-plugin/
          rsync -a .codex-plugin liveblocks-plugin/
          rsync -a .cursor-plugin liveblocks-plugin/
          rsync -a .mcp.json liveblocks-plugin/
          rsync -a LICENSE.md README.md liveblocks-plugin/
          rsync -a assets liveblocks-plugin/
          rsync -a plugins liveblocks-plugin/
          rsync -a skills liveblocks-plugin/

      - name: Commit and push changes
        working-directory: liveblocks-plugin
        run: |
          git config user.name "liveblocks-bot"
          git config user.email "hello@liveblocks.io"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          git add -A
          git commit -m "Sync from liveblocks/skills"
          git push
